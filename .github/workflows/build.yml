name: Build NotificationGrouper

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Theos
      run: |
        export THEOS=/Users/runner/work/Theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        brew install ldid
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        echo "PATH=$THEOS/bin:$PATH" >> $GITHUB_ENV
      shell: bash
      
    - name: Download iOS 17 SDK
      run: |
        mkdir -p $THEOS/sdks
        curl -L -o /tmp/ios17.sdk.tar.xz "https://github.com/MagicFoundation/PlatformSDKs/releases/download/ios-17.0/sdk.tar.xz" && \
          tar -xf /tmp/ios17.sdk.tar.xz -C $THEOS/sdks/ || \
          echo "::warning::iOS 17 SDK download failed, will try iOS 16.5"
        ls -la $THEOS/sdks/
      shell: bash
      continue-on-error: true
      
    - name: Build Tweak (Rootless)
      run: |
        cd $GITHUB_WORKSPACE
        make clean
        make package FINALPACKAGE=1 THEOS_PACKAGE_DIR=packages THEOS_PACKAGE_SCHEME=rootless
        ls -la packages/
        ls -la .theos/obj/deb/
        echo "=== Checking deb structure ==="
        if command -v dpkg-deb &> /dev/null; then
          dpkg-deb -c packages/*.deb || true
        fi
      shell: bash
      
    - name: Upload DEB Package
      uses: actions/upload-artifact@v4
      with:
        name: NotificationGrouper-DEB
        path: packages/*.deb
        retention-days: 30
      if: always()
